name: Daily Morning Stock Report

on:
  schedule:
    # Runs every day at 08:00 UTC
    # Note: UTC != local time. 08:00 UTC is:
    # - 08:00 in Ireland in winter
    # - 09:00 in Ireland in summer (DST)
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  morning-report:
    runs-on: ubuntu-latest

    env:
      # These are passed from GitHub Secrets (set them in repo Settings → Secrets and variables → Actions)
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning report
        run: |
          python run_morning_report.py
